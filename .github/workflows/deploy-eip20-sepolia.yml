name: Deploy eip20 sepolia
run-name: Deploy eip20 subgraph ${{ github.ref_name }} for sepolia by @${{ github.actor }}
on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.actor }}
  cancel-in-progress: true

jobs:
  subgraph:
    name: Subgraph - Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: "npm"
      - run: npm install
      - run: npm run clean
      - run: cp subgraph-sepolia.yaml subgraph.yaml
      - run: npm run codegen
      - run: npm run build
      - run: npm run graph auth ${{ secrets.THE_GRAPH_EIP_20_SEPOLIA_DEPLOY_KEY }}
      - run: npm run deploy eip-20-sepolia -- --node https://api.studio.thegraph.com/deploy/ --ipfs https://api.thegraph.com/ipfs/ --version-label ${{ github.ref_name }}
