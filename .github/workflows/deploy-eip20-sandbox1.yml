name: Deploy eip20 sandbox1
run-name: Deploy eip20 subgraph ${{ github.ref_name }} for sandbox1 by @${{ github.actor }}
on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.actor }}
  cancel-in-progress: true

env:
  # graph-cli talks to the admin RPC via a client that accepts credentials in the URL.
  ADMIN_NODE: https://admin:${{ secrets.SANDBOX1_GRAPHNODE_ADMIN_PASSWORD }}@admin.graphnode.sandbox1.japanopenchain.org
  # IPFS upload uses fetch(), which rejects credentials in the URL, so we go through
  # a local proxy (see the "Start IPFS auth proxy" step) that injects Basic Auth.
  IPFS_TARGET: https://ipfs.graphnode.sandbox1.japanopenchain.org
  IPFS_NODE: http://127.0.0.1:5001

jobs:
  subgraph:
    name: Subgraph - Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: "npm"
      - run: npm install
      - run: npm run clean
      - run: cp subgraph-sandbox1.yaml subgraph.yaml
      - run: npm run codegen
      - run: npm run build
      # Register the subgraph name (only needed the first time; ignore "already exists" on redeploys)
      - name: Create subgraph
        continue-on-error: true
        run: npm run create gugroup/eip-20 -- --node "$ADMIN_NODE"
      - name: Start IPFS auth proxy
        env:
          IPFS_PASS: ${{ secrets.SANDBOX1_GRAPHNODE_ADMIN_PASSWORD }}
        run: |
          node scripts/ipfs-auth-proxy.mjs &
          for i in $(seq 1 20); do
            curl -sf -X POST -o /dev/null "$IPFS_NODE/api/v0/version" && break || sleep 0.5
          done
      - name: Deploy subgraph
        run: >
          npm run deploy gugroup/eip-20 --
          --node "$ADMIN_NODE"
          --ipfs "$IPFS_NODE"
          --version-label ${{ github.ref_name }}
